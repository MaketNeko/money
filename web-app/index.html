<div class="app">
  <!-- ท้องฟ้าดวงดาว (แสดงเฉพาะชุดสี "ดวงดาว") -->
  <div class="sky" aria-hidden="true">
    <div class="neb neb1"></div>
    <div class="neb neb2"></div>
    <span class="tw tw1">✦</span>
    <span class="tw tw2">✧</span>
    <span class="tw tw3">✧</span>
  </div>

  <!-- appbar -->
  <div class="appbar">
    <span class="back" id="appbarLeft"><h1 id="appTitle">หน้าหลัก</h1></span>
    <span id="appbarRight"></span>
  </div>

  <!-- screens -->
  <div class="screen" id="screen-home" data-screen="home"></div>
  <div class="screen" id="screen-history" data-screen="history" hidden></div>
  <div class="screen" id="screen-bills" data-screen="bills" hidden></div>
  <div class="screen" id="screen-debt" data-screen="debt" hidden></div>
  <div class="screen" id="screen-tax" data-screen="tax" hidden></div>
  <div class="screen" id="screen-wallets" data-screen="wallets" hidden></div>
  <div class="screen" id="screen-categories" data-screen="categories" hidden></div>
  <div class="screen" id="screen-settings" data-screen="settings" hidden></div>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="App.openAdd()"><svg class="i"><use href="#i-plus"/></svg> ลงเงิน</button>

  <!-- bottom nav (built by app.js ตามโหมด) -->
  <nav class="nav" id="nav"></nav>
</div>

<!-- overlay mount (add sheet / bill edit / dialogs) -->
<div id="overlay"></div>

<!-- toast + update banner -->
<div class="toast" id="toast"></div>
<div class="update-banner" id="updateBanner" hidden>
  <span class="txt">มีเวอร์ชันใหม่</span>
  <button onclick="App.applyUpdate()">อัปเดต</button>
</div>
<div class="install-banner" id="installBanner" hidden>
  <span class="ic"><svg class="i"><use href="#i-import"/></svg></span>
  <div class="txt"><b>ติดตั้งแอปลงเครื่อง</b><span>เปิดเร็ว ใช้ออฟไลน์ได้ เหมือนแอปจริง</span></div>
  <button class="go" onclick="App.installApp()">ติดตั้ง</button>
  <button class="x" onclick="App.dismissInstall()" aria-label="ปิด">✕</button>
</div>

<script src="./js/store.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
