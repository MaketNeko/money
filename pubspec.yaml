name: money_app
description: "แอปบันทึกรายรับ-รายจ่าย + เตือนบิล (เฟส 1)"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # เก็บข้อมูลในเครื่อง (offline, ไม่มี server)
  sqflite: ^2.3.3
  path: ^1.9.0

  # จัดรูปแบบตัวเลข/วันที่
  intl: ^0.19.0

  # state management (เบา ๆ พอสำหรับเฟส 1)
  provider: ^6.1.2

  # ฟอนต์ IBM Plex Sans Thai (UI) + Lexend (ตัวเลข) โหลดผ่าน google_fonts
  google_fonts: ^6.2.1

  # โดนัทหมวดรายจ่ายบนหน้า Home
  fl_chart: ^0.68.0

  # เตือนบิลแบบ local scheduled (offline, เวลาไทย)
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # export/import ไฟล์ JSON สำหรับ backup
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  file_picker: ^8.1.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
